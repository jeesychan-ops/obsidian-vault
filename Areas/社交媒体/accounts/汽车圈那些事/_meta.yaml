## 风险提示

⚠️ 这个方向有合规风险：
- 不能直接点名某品牌/某4S店
- 维权案例要做模糊化处理
- 涉及法律问题的内容建议加"本文不构成法律建议"
- 避免使用"黑心""欺骗"等绝对化用语

