# 汽车圈那些事

## 账号基本信息

- **平台**：公众号
- **核心身份**：汽车圈的"扒皮者"，揭露行业潜规则
- **目标人群**：想买车+怕被坑的人
- **核心价值**：站在消费者一边，提供"内幕"价值

## 差异化卖点

- **敢于得罪人**（不接黑心商家的钱）
- **实战案例**（真实的维权故事、消费陷阱）
- **解读政策**（第一时间解读新规变化）

## 爆款选题方向

1. 4S店内幕：「为什么销售员最怕你问这3个问题」
2. 二手车：「二手车贩子的3个惯用套路」
3. 维权案例：「我维权了3个月，最终拿到2万赔偿」
4. 政策解读：「2025年新交规，90%的司机都不知道」

## 启动内容（第1-2周）

### 第1周（建立人设期）
- 自我介绍：「为什么要揭汽车圈的老底」
- 行业观察：「4S店的5个套路，新手100%中招」
- 故事开场：「朋友被坑3万，我决定做这个号」

### 第2周（干货输出期）
- 4S店内幕：「为什么销售员最怕你问这3个问题」
- 二手车套路：「二手车贩子打死不告诉你的3个细节」
- 真实维权：「我维权了3个月，最终拿到2万赔偿」

