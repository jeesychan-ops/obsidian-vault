# 车主真实生活

## 账号基本信息

- **平台**：公众号
- **核心身份**：真实车主，记录买车后的"惊喜与后悔"
- **目标人群**：已买车+想了解真实用车体验的人
- **核心价值**：真实故事+养车成本+自驾体验

## 差异化卖点

- **真实车主视角**（不靠数据，靠亲身体验）
- **聚焦生活场景**（养娃、通勤、维权、旅行）
- **共鸣感强**（"你说的就是我啊"）

## 爆款选题方向

1. 养车成本：「月薪8000，养一台30万的车现实吗」
2. 真实故事：「开了3年XX车，我最后悔的3个决定」
3. 自驾路线：「带全家自驾XX，这3点要注意」
4. 维权案例：「在4S店被坑后，我是如何维权的」

## 启动内容（第1-2周）

### 第1周（建立人设期）
- 自我介绍：「我为什么开始记录用车生活」
- 第一台车故事：「我的第一台车，现在还在服役」
- 长期更新：准备开一个「5年用车日记」系列

### 第2周（干货输出期）
- 养车成本：「月薪8000养车的真实账本」
- 日常通勤：「开了1年通勤，最大的变化是XX」
- 真实故事：「朋友卖掉3年房子，全款买了这台车」

