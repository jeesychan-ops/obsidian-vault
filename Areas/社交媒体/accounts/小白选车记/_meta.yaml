# 小白选车记

## 账号基本信息

- **平台**：公众号
- **核心身份**：用小白视角帮普通人选车的"装懂"博主
- **目标人群**：准备买车的打工人/家庭第一台车/预算10-30万
- **核心价值**：不吹不黑不专业术语，全是大白话+真实数据

## 差异化卖点

- **不是专业车评人**，但比销售员诚实
- **站在消费者这边**，不会为了广告吹某品牌
- **真实数据说话**（不靠感觉，靠实际使用）

## 爆款选题方向

1. 预算+对比+悬念：「10万预算，为什么4S店打死不推荐这3款车」
2. 选车避坑攻略：「买车前必问3个问题」
3. 真实体验分享：「我去4S店看车全过程」

## 启动内容（第1-2周）

### 第1周（建立人设期）
- 自我介绍：「为什么我来做汽车内容」
- 行业观察：「小白眼中的汽车圈」
- 读者调查：「你想看什么」

### 第2周（干货输出期）
- 选车指南：「10万预算的3个真相」
- 避坑攻略：「买车前必问3个问题」
- 真实体验：「我去4S店看车全过程」

